<!DOCTYPE html>
<html>
<head>
    <title>Happy Birthday Dad!</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Blue to Red Gradient Background */
            background: linear-gradient(to bottom, #1a2a6c, #b21f1f);
            color: white;
            overflow-x: hidden;
        }

        .timeline {
            position: relative;
            max-width: 800px;
            margin: 0 auto;
            padding: 100px 0;
        }

        /* The vertical line */
        .timeline::after {
            content: '';
            position: absolute;
            width: 4px;
            background-color: rgba(255,255,255,0.3);
            top: 0; bottom: 0; left: 50%;
            margin-left: -2px;
        }

        .container {
            padding: 10px 40px;
            position: relative;
            width: 50%;
            opacity: 0;
            transform: translateY(50px);
            transition: all 0.8s ease-out;
        }

        .container.show {
            opacity: 1;
            transform: translateY(0);
        }

        .left { left: 0; box-sizing: border-box; }
        .right { left: 50%; box-sizing: border-box; }

        .content {
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        h1 { text-align: center; font-size: 3rem; margin-top: 50px; }
        .lyric { font-style: italic; color: #ffd700; font-size: 0.9rem; }
    </style>
</head>
<body>

    <h1>Happy Birthday, Dad! 🚜✨</h1>
    <p style="text-align: center;">Scroll down through the years...</p>

    <div class="timeline" id="timeline">
        <div class="container left">
            <div class="content">
                <h2>The Seeds are Sown</h2>
                <p>Remember when you planted those first tomatoes?</p>
                <p class="lyric">"Questions of science, science and progress..."</p>
            </div>
        </div>
        <div class="container right">
            <div class="content">
                <h2>A Sky Full of Stars</h2>
                <p>Watching the harvest moon over the north field.</p>
                <p class="lyric">"I'm gonna give you my heart..."</p>
            </div>
        </div>
        </div>

    <script>
        const containers = document.querySelectorAll('.container');

        const checkbox = () => {
            const triggerBottom = window.innerHeight / 5 * 4;
            containers.forEach(container => {
                const containerTop = container.getBoundingClientRect().top;
                if(containerTop < triggerBottom) {
                    container.addClassName = container.classList.add('show');
                }
            });
        }

        window.addEventListener('scroll', checkbox);
        checkbox(); // Initial check
    </script>
</body>
</html>
